[package]
name = "ultimate_hacker_toolkit"
version = "3.0.0"
edition = "2021"

[[bin]]
name = "htool"
path = "src/cli.rs"

[[bin]]
name = "htool-gui"
path = "src/main.rs"

[dependencies]
# GUI
eframe = "0.27"
egui = "0.27"

# Async networking
tokio = { version = "1.0", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "stream", "cookies", "gzip", "brotli", "deflate", "socks"] }
native-tls = "0.2"

# CLI & config
clap = { version = "4.5", features = ["derive"] }
toml = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Utilities
chrono = "0.4"
url = "2.5"
regex = "1.10"
rand = "0.8"
futures = "0.3"
rfd = "0.14"
governor = "0.6"
maud = "0.25"
once_cell = "1.19"
async-trait = "0.1"
mimalloc = "0.1.52"
